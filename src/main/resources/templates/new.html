<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nieuw Evenement</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f2f2f2;
        }
        nav {
            background-color: #2255aa;
            padding: 15px;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-size: 16px;
        }
        .inhoud {
            max-width: 600px;
            margin: 30px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            background-color: #2255aa;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .fout {
            background-color: #ffdddd;
            color: red;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
        }
        footer {
            text-align: center;
            padding: 20px;
            color: gray;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<!-- NAVIGATIE -->
<nav>
    <a href="/">NGO Anderlecht</a>
    <a href="/new">Nieuw evenement</a>
    <a href="/about">About</a>
</nav>

<!-- INHOUD -->
<div class="inhoud">
    <h1>Nieuw Evenement</h1>

    <!-- FOUTMELDING -->
    <div class="fout" th:if="${fout}" th:text="${fout}"></div>

    <form th:action="@{/new}" th:object="${event}" method="post">

        <label>Titel</label>
        <input type="text" th:field="*{titel}"/>

        <label>Omschrijving</label>
        <textarea th:field="*{omschrijving}" rows="4"></textarea>

        <label>Organisatie</label>
        <input type="text" th:field="*{organisatie}"/>

        <label>Mail contactpersoon</label>
        <input type="email" th:field="*{mailContactpersoon}"/>

        <label>Tijdstip</label>
        <input type="datetime-local" th:field="*{tijdstip}"/>

        <label>Locatie</label>
        <select name="locatie.id">
            <option th:each="locatie : ${locaties}"
                    th:value="${locatie.id}"
                    th:text="${locatie.naam}">
            </option>
        </select>

        <button type="submit">Opslaan</button>
    </form>
</div>

<!-- FOOTER -->
<footer>
    &copy; 2026 NGO Anderlecht
</footer>

</body>
</html>
